name: Images

on:
  pull_request:
  workflow_dispatch:
    inputs:
      push:
        description: Push sha-tagged images to GHCR instead of doing a build-only smoke pass
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  build-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: customer-web
            dockerfile: apps/customer-web/Dockerfile
            image: ghcr.io/firatoezcan/firapps-customer-web
          - id: admin-web
            dockerfile: apps/admin-web/Dockerfile
            image: ghcr.io/firatoezcan/firapps-admin-web
          - id: public-api
            dockerfile: apps/public-api/Dockerfile
            image: ghcr.io/firatoezcan/firapps-public-api
          - id: internal-api
            dockerfile: apps/internal-api/Dockerfile
            image: ghcr.io/firatoezcan/firapps-internal-api
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        if: github.event_name == 'workflow_dispatch' && inputs.push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: firatoezcan
          password: ${{ secrets.GHCR_WRITE_TOKEN }}
      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'workflow_dispatch' && inputs.push }}
          tags: ${{ matrix.image }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ matrix.id }}
          cache-from: type=gha,scope=${{ matrix.id }}
          cache-to: type=gha,mode=max,scope=${{ matrix.id }}
