apiVersion: v1
kind: ServiceAccount
metadata:
  name: public-api
  labels:
    app.kubernetes.io/name: public-api
    app.kubernetes.io/part-of: firapps
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: public-api
  labels:
    app.kubernetes.io/name: public-api
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: firapps
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: public-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: public-api
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: firapps
    spec:
      serviceAccountName: public-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: public-api
          image: ghcr.io/firatoezcan/firapps-public-api:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: APP_NAME
              value: public-api
            - name: PORT
              value: "4000"
            - name: LOG_LEVEL
              value: debug
            - name: RUN_MIGRATIONS_ON_BOOT
              value: "true"
            - name: DATABASE_SCHEMA
              value: catalog
            - name: DATABASE_MIGRATIONS_SCHEMA
              value: public
            - name: DATABASE_MIGRATIONS_TABLE
              value: __drizzle_public_api_migrations
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: firapps-dev-db-app
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: firapps-dev-db-app
                  key: password
            - name: DATABASE_URL
              value: postgresql://$(DATABASE_USER):$(DATABASE_PASSWORD)@firapps-dev-db-rw:5432/firapps
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: public-api
  labels:
    app.kubernetes.io/name: public-api
    app.kubernetes.io/part-of: firapps
  annotations:
    dev.firapps.io/scope: local-development-only
spec:
  selector:
    app.kubernetes.io/name: public-api
  ports:
    - name: http
      port: 4000
      targetPort: http
